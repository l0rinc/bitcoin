<circle cx="892.8947368421053" cy="1675.2177727272726" r="4" fill="#ffffff" stroke="#6c4ab6" stroke-width="2"/>
<circle cx="958.1578947368421" cy="1673.414409090909" r="4" fill="#ffffff" stroke="#6c4ab6" stroke-width="2"/>
<circle cx="1023.421052631579" cy="1671.6723181818181" r="4" fill="#ffffff" stroke="#6c4ab6" stroke-width="2"/>
