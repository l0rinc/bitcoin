<text x="185.0" y="1773.011318181818" font-size="14" font-weight="800" text-anchor="start" fill="#17222c">1-of-1: 1.70 MB</text>
<text x="250.26315789473682" y="1721.2666818181817" font-size="14" font-weight="800" text-anchor="start" fill="#17222c">2-of-2: 2.11 MB</text>
<text x="446.05263157894734" y="1691.3785" font-size="14" font-weight="800" text-anchor="start" fill="#17222c">5-of-5: 2.77 MB</text>
<text x="772.3684210526316" y="1670.688409090909" font-size="14" font-weight="800" text-anchor="start" fill="#17222c">10-of-10: 3.22 MB</text>
<text x="1405.0" y="1655.8008181818182" font-size="14" font-weight="800" text-anchor="end" fill="#17222c">20-of-20: 3.55 MB</text>
<text x="795.0" y="1814" font-size="16" font-weight="700" text-anchor="middle" fill="#5f6b77">number of pubkeys/signatures in one P2WSH CHECKMULTISIG spend</text>
<text x="120" y="1642" font-size="16" font-weight="700" text-anchor="start" fill="#5f6b77">serialized block size at full weight</text>
<text x="105" y="1850" font-size="18" font-weight="400" fill="#17222c">The curve tops out at 20 because P2WSH OP_CHECKMULTISIG is consensus-capped at 20 pubkeys. At that cap, standard SegWit-only</text>
<text x="105" y="1874" font-size="18" font-weight="400" fill="#17222c">spends fill the 4M-weight block and serialize to about 3.55 MB.</text>
<text x="105" y="2030" font-size="19" font-weight="700" fill="#17222c">Generated from the passing functional test run: mined cases used standard mempool P2WSH spends; the curve is the same P2WSH spend-size</text>
<text x="105" y="2057" font-size="19" font-weight="700" fill="#17222c">simulation printed by the test.</text>
</svg>